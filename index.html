<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pinterest Style Gallery</title>

  <style>
    :root {
      --gap: 12px;
      --radius: 16px;
      --bg-light: #ffffff;
      --bg-dark: #0f0f0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg-light);
      font-family: Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: var(--bg-dark);
      }
    }

    .gallery {
  column-count: 2;
  column-gap: var(--gap);
  padding: var(--gap);
  width: 100%;        /* full width */
  margin: 0;          /* remove centering */
}

    @media (min-width: 700px) {
      .gallery {
        column-count: 3;
      }
    }

    @media (min-width: 1000px) {
      .gallery {
        column-count: 5;
      }
    }

    @media (min-width: 1400px) {
      .gallery {
        column-count: 6;
      }
    }

    .item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      border-radius: var(--radius);
      overflow: hidden;
      background: #ddd;
    }

    .item img {
      width: 100%;
      display: block;
      border-radius: var(--radius);
      object-fit: cover;
    }

    /* mixed card heights for Pinterest vibe */
    .short img {
      height: 180px;
    }

    .medium img {
      height: 260px;
    }

    .tall img {
      height: 360px;
    }

    .x-tall img {
      height: 460px;
    }

    .body {
  background: #ffffff;
  transition: background 0.3s ease;
    }

    @media (max-width: 600px) {
      :root {
        --gap: 10px;
        --radius: 14px;
      }

      .short img {
        height: 140px;
      }

      .medium img {
        height: 200px;
      }

      .tall img {
        height: 280px;
      }

      .x-tall img {
        height: 340px;
      }
    }
    
    @media (prefers-color-scheme: dark) {
  .body {
    background: #0f0f0f;
  }
}
  </style>
</head>
<body>
